<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>FUMOCLICK</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
* {  
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    user-select: none;
    -webkit-user-select: none;
    -webkit-touch-callout: none;
    -webkit-tap-highlight-color: transparent;
}

body {
    width: 100vw;
    height: 100vh;
    overflow: hidden;
    display: flex;
    justify-content: center;
    align-items: center;
    background: var(--tg-theme-bg-color, #fff);
    color: var(--tg-theme-text-color, #000);
    font-family: Arial, Helvetica, sans-serif;
    cursor: url('https://raw.githubusercontent.com/wei9htlessness/FUMOCLICK/main/cursor.png'), auto;
    overscroll-behavior: none;
    touch-action: manipulation;
}

#assetCache {
    position: absolute;
    width: 1px;
    height: 1px;
    overflow: hidden;
    opacity: 0;
    pointer-events: none;
    z-index: -1;
}

#loadingScreen {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: var(--tg-theme-bg-color, #fff);
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    z-index: 10000;
    transition: opacity 0.5s ease;
}

#loadingScreen.hidden {
    opacity: 0;
    pointer-events: none;
}

.loader {
    border: 6px solid rgba(128, 128, 128, 0.2);
    border-top: 6px solid var(--tg-theme-text-color, #000);
    border-radius: 50%;
    width: 50px;
    height: 50px;
    animation: spin 1s linear infinite;
    margin-bottom: 20px;
}

@keyframes spin {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
}

#loadingText {
    font-size: 24px;
    font-weight: bold;
    color: var(--tg-theme-text-color, #000);
}

.game {
    display: flex;
    flex-direction: column;
    align-items: center;
    position: relative;
    z-index: 10;
    opacity: 0;
    transition: opacity 0.5s ease;
}

.game.visible {
    opacity: 1;
}

#boostText {
    font-size: 36px;
    font-weight: 900;
    color: #ff2a2a;
    margin-bottom: 10px;
    opacity: 0;
    transform: scale(0.8);
    transition: opacity 0.3s ease, transform 0.3s ease;
    text-shadow: 2px 2px 0px rgba(0,0,0,0.1);
    pointer-events: none;
}

#boostText.active {
    opacity: 1;
    transform: scale(1);
}

#counter {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 4px;
    animation: counterFloat 2.1s ease-in-out infinite;
}

#counter.pop {
    animation:
        counterFloat 2.1s ease-in-out infinite,
        counterPop .18s ease;
}

.digit-img {
    height: 96px;
    width: auto;
    display: block;
    -webkit-user-drag: none;
    pointer-events: none;
}

#clickArea {
    margin-top: 20px;
    animation: idle 3.5s ease-in-out infinite;
    transform-origin: center bottom;
    cursor: url('https://raw.githubusercontent.com/wei9htlessness/FUMOCLICK/main/cursor.png'), pointer;
    -webkit-touch-callout: none;
    touch-action: none; 
}

#clickImage {
    height: 80vh;
    width: auto;
    display: block;
    pointer-events: none;
    transform: scale(1);
    transition: transform .15s ease-out;
    -webkit-user-drag: none;
}

@keyframes idle {
    0%, 100% { transform: rotate(-2deg); }
    50% { transform: rotate(2deg); }
}

@keyframes counterFloat {
    0%, 100% { transform: translateY(-7px); }
    50% { transform: translateY(7px); }
}

@keyframes counterPop {
    0%, 100% { transform: translateY(0) scale(1); }
    50% { transform: translateY(-10px) scale(1.12); }
}

.boost-container {
    position: absolute;
    width: 150px;
    height: 150px;
    cursor: url('https://raw.githubusercontent.com/wei9htlessness/FUMOCLICK/main/cursor.png'), pointer;
    z-index: 1000;
    animation: boostSway 2s ease-in-out infinite;
    transition: transform 0.3s ease, opacity 0.3s ease; 
    touch-action: none;
}

.boost-image {
    width: 100%;
    height: 100%;
    object-fit: contain;
    animation: boostPulse 0.25s ease-in-out infinite alternate;
    -webkit-user-drag: none;
    pointer-events: none;
}

@keyframes boostSway {
    0%, 100% { transform: translateX(0) rotate(-6deg); }
    50% { transform: translateX(15px) rotate(6deg); }
}

@keyframes boostPulse {
    0% { transform: scale(0.85); }
    100% { transform: scale(1.15); }
}

</style>

</head>
<body>

<div id="assetCache"></div>

<div id="loadingScreen">
    <div class="loader"></div>
    <div id="loadingText">ЗАГРУЗКА РЕСУРСОВ...</div>
</div>

<div class="game" id="gameContainer">
    <div id="boostText">КЛИКИ Х2</div>
    <div id="counter"></div>
    
    <div id="clickArea">
        <img
            id="clickImage"
            src="https://raw.githubusercontent.com/wei9htlessness/FUMOCLICK/main/fumo/1.png"
            draggable="false"
            alt="Click me">
    </div>
</div>

<script>
// 1. Инициализация Telegram WebApp НЕМЕДЛЕННО
const tg = window.Telegram?.WebApp;
if (tg) {
    tg.ready();
    tg.expand();
    if (tg.disableVerticalSwipes) {
        tg.disableVerticalSwipes();
    }
}

function triggerHaptic(type = 'light') {
    if (tg && tg.HapticFeedback) {
        tg.HapticFeedback.impactOccurred(type);
    }
}

const resources = [
    'https://raw.githubusercontent.com/wei9htlessness/FUMOCLICK/main/fumo/1.png',
    'https://raw.githubusercontent.com/wei9htlessness/FUMOCLICK/main/monsterwhite.png',
    'https://raw.githubusercontent.com/wei9htlessness/FUMOCLICK/main/cursor.png',
    'https://raw.githubusercontent.com/wei9htlessness/FUMOCLICK/229759d970c82547abda87e16ed389fd2f996cd2/pop.ogg',
    ...Array.from({length: 10}, (_, i) => `https://raw.githubusercontent.com/wei9htlessness/FUMOCLICK/main/numbers/${i}.png`)
];

let clicks = 0;
let clickMultiplier = 1; 

const counter = document.getElementById("counter");
const clickArea = document.getElementById("clickArea");
const image = document.getElementById("clickImage");
const boostText = document.getElementById("boostText");
const loadingScreen = document.getElementById("loadingScreen");
const gameContainer = document.getElementById("gameContainer");
const assetCache = document.getElementById("assetCache");

let boostTimeout;
let multiplierTimeout;
const soundUrl = "https://raw.githubusercontent.com/wei9htlessness/FUMOCLICK/229759d970c82547abda87e16ed389fd2f996cd2/pop.ogg";

// 2. Максимально надёжная функция предзагрузки
async function preloadResources() {
    const promises = resources.map(url => {
        return new Promise(resolve => {
            let isResolved = false;
            const finish = () => {
                if (!isResolved) {
                    isResolved = true;
                    resolve(url);
                }
            };

            if (url.endsWith('.ogg')) {
                const audio = new Audio();
                audio.addEventListener('canplaythrough', finish, { once: true });
                audio.addEventListener('error', finish, { once: true });
                audio.src = url;
                audio.load();
            } else {
                const img = new Image();
                img.addEventListener('load', finish, { once: true });
                img.addEventListener('error', finish, { once: true });
                img.src = url;
            }
            
            // Уровень защиты 1: Таймаут 3 секунды для каждого отдельного файла
            setTimeout(finish, 3000);
        });
    });

    // Уровень защиты 2: Глобальный таймаут 5 секунд на всю загрузку
    const globalTimeout = new Promise(resolve => setTimeout(() => resolve('global_timeout'), 5000));

    await Promise.race([Promise.all(promises), globalTimeout]);
    
    // Плавный переход
    await new Promise(r => setTimeout(r, 300));
    
    loadingScreen.classList.add('hidden');
    gameContainer.classList.add('visible');
    
    initGame();
}

function initGame() {
    for (let i = 0; i <= 9; i++) {
        const img = document.createElement("img");
        img.src = `https://raw.githubusercontent.com/wei9htlessness/FUMOCLICK/main/numbers/${i}.png`;
        img.className = "digit-img";
        assetCache.appendChild(img);
    }
    
    updateCounterDisplay();
    scheduleNextBoost();
}

function updateCounterDisplay() {
    const clicksStr = clicks.toString();
    const currentImages = Array.from(counter.querySelectorAll('.digit-img'));

    for (let i = currentImages.length; i < clicksStr.length; i++) {
        const img = document.createElement("img");
        img.className = "digit-img";
        img.draggable = false;
        counter.appendChild(img);
        currentImages.push(img);
    }

    while (currentImages.length > clicksStr.length) {
        const imgToRemove = currentImages.pop();
        counter.removeChild(imgToRemove);
    }

    for (let i = 0; i < clicksStr.length; i++) {
        const digit = clicksStr[i];
        const expectedSrc = `https://raw.githubusercontent.com/wei9htlessness/FUMOCLICK/main/numbers/${digit}.png`;
        
        if (!currentImages[i].src.includes(`${digit}.png`)) {
            currentImages[i].src = expectedSrc;
        }
    }
}

function processClick(e) {
    if (e && e.cancelable) e.preventDefault();
    
    clicks += (1 * clickMultiplier);
    updateCounterDisplay();

    playClickSound();
    triggerHaptic('light');

    image.style.transform = "scale(1.1)";

    counter.classList.remove("pop");
    void counter.offsetWidth; 
    counter.classList.add("pop");
}

function resetClickAnimation(e) {
    if (e && e.cancelable) e.preventDefault();
    image.style.transform = "scale(1)";
}

clickArea.addEventListener("touchstart", processClick, { passive: false });
clickArea.addEventListener("touchend", resetClickAnimation, { passive: false });
clickArea.addEventListener("touchcancel", resetClickAnimation, { passive: false });

clickArea.addEventListener("mousedown", processClick);
clickArea.addEventListener("mouseup", resetClickAnimation);
clickArea.addEventListener("mouseleave", resetClickAnimation);
clickArea.addEventListener("contextmenu", (e) => e.preventDefault());

function playClickSound() {
    const sound = new Audio(soundUrl);
    sound.volume = 0.5;
    sound.play().catch(err => console.log("Ошибка звука:", err));
}

function spawnBoost() {
    const container = document.createElement("div");
    container.className = "boost-container";

    const img = document.createElement("img");
    img.src = "https://raw.githubusercontent.com/wei9htlessness/FUMOCLICK/main/monsterwhite.png";
    img.className = "boost-image";
    img.draggable = false;

    container.appendChild(img);
    document.body.appendChild(container);

    const boostSize = 150;
    const maxX = window.innerWidth - boostSize - 20;
    const maxY = window.innerHeight - boostSize - 20;
    const randomX = Math.max(20, Math.random() * maxX);
    const randomY = Math.max(20, Math.random() * maxY);

    container.style.left = randomX + "px";
    container.style.top = randomY + "px";

    const activateBoost = (e) => {
        if (e && e.cancelable) e.preventDefault();
        e.stopPropagation();

        playClickSound();
        triggerHaptic('medium');

        clickMultiplier = 2;
        boostText.classList.add("active");

        container.style.transform = "scale(1.3)";
        container.style.opacity = "0";
        
        setTimeout(() => {
            if (document.body.contains(container)) {
                container.remove();
            }
        }, 300);

        clearTimeout(boostTimeout);
        clearTimeout(multiplierTimeout);
        
        multiplierTimeout = setTimeout(() => {
            clickMultiplier = 1;
            boostText.classList.remove("active");
            scheduleNextBoost();
        }, 10000);
    };

    container.addEventListener("touchstart", activateBoost, { passive: false });
    container.addEventListener("mousedown", activateBoost);
    container.addEventListener("contextmenu", (e) => e.preventDefault());

    boostTimeout = setTimeout(() => {
        if (document.body.contains(container)) {
            container.remove();
            scheduleNextBoost(); 
        }
    }, 5000);
}

function scheduleNextBoost() {
    const delay = Math.floor(Math.random() * (40000 - 15000 + 1)) + 15000;
    setTimeout(spawnBoost, delay);
}

// 3. Запускаем загрузку НЕМЕДЛЕННО, не дожидаясь window.load
// Это гарантирует, что функция выполнится даже в специфичных WebView окружениях
preloadResources();

</script>

</body>
</html>
