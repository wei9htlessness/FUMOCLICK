<!DOCTYPE html><html lang="ru"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"><title>FUMOCLICK</title><script src="https://telegram.org/js/telegram-web-app.js"></script><style>*{margin:0;padding:0;box-sizing:border-box;user-select:none;-webkit-user-select:none;-webkit-touch-callout:none;-webkit-tap-highlight-color:transparent}body{width:100vw;height:100vh;overflow:hidden;display:flex;justify-content:center;align-items:center;background:var(--tg-theme-bg-color,#fff);color:var(--tg-theme-text-color,#000);font-family:Arial,Helvetica,sans-serif;cursor:url('https://raw.githubusercontent.com/wei9htlessness/FUMOCLICK/main/cursor.png'),auto;overscroll-behavior:none;touch-action:manipulation}#assetCache{position:absolute;width:1px;height:1px;overflow:hidden;opacity:0;pointer-events:none;z-index:-1}#loadingScreen{position:fixed;top:0;left:0;width:100%;height:100%;background:var(--tg-theme-bg-color,#fff);display:flex;flex-direction:column;justify-content:center;align-items:center;z-index:10000;transition:opacity .5s ease}#loadingScreen.hidden{opacity:0;pointer-events:none}.loader{border:5px solid rgba(128,128,128,.2);border-top:5px solid var(--tg-theme-text-color,#000);border-radius:50%;width:38px;height:38px;animation:spin 1s linear infinite;margin-bottom:20px}@keyframes spin{0%{transform:rotate(0)}100%{transform:rotate(360deg)}}#loadingText{font-size:18px;font-weight:bold;color:var(--tg-theme-text-color,#000)}.game{display:flex;flex-direction:column;align-items:center;position:relative;z-index:10;opacity:0;transition:opacity .5s ease;margin-top:-150px}.game.visible{opacity:1}#boostIndicator{position:absolute;top:calc(65% + 130px);left:calc(60% + 60px);transform:translate(-50%,-50%) rotate(-45deg);opacity:0;pointer-events:none;transition:opacity .3s ease;z-index:20}#boostIndicator.active{opacity:1}.x2-img{width:120px;height:auto;animation:x2Pulse .3s ease-in-out infinite alternate;pointer-events:none;-webkit-user-drag:none}@keyframes x2Pulse{0%{transform:scale(.8)}100%{transform:scale(1.2)}}#counter{display:flex;justify-content:center;align-items:center;gap:3px;animation:counterFloat 2.1s ease-in-out infinite}#counter.pop{animation:counterFloat 2.1s ease-in-out infinite,counterPop .18s ease}.digit-img{height:72px;width:auto;display:block;-webkit-user-drag:none;pointer-events:none}#clickArea{margin-top:20px;animation:idle 3.5s ease-in-out infinite;transform-origin:center bottom;cursor:url('https://raw.githubusercontent.com/wei9htlessness/FUMOCLICK/main/cursor.png'),pointer;-webkit-touch-callout:none;touch-action:none}#clickImage{height:60vh;width:auto;display:block;pointer-events:none;transform:scale(1);transition:transform .15s ease-out;-webkit-user-drag:none}@keyframes idle{0%,100%{transform:rotate(-2deg)}50%{transform:rotate(2deg)}}@keyframes counterFloat{0%,100%{transform:translateY(-7px)}50%{transform:translateY(7px)}}@keyframes counterPop{0%,100%{transform:translateY(0) scale(1)}50%{transform:translateY(-10px) scale(1.12)}}.boost-container{position:absolute;width:150px;height:150px;cursor:url('https://raw.githubusercontent.com/wei9htlessness/FUMOCLICK/main/cursor.png'),pointer;z-index:1000;animation:boostSway 2s ease-in-out infinite,boostSpringIn 1s cubic-bezier(.34,1.56,.64,1) forwards;transition:transform .3s ease,opacity .3s ease;touch-action:none}.boost-container.removing{animation:boostRemove .3s ease forwards!important}.boost-image{width:100%;height:100%;object-fit:contain;animation:boostPulse .25s ease-in-out infinite alternate;-webkit-user-drag:none;pointer-events:none}@keyframes boostSpringIn{0%{transform:scale(0)}40%{transform:scale(1.4)}60%{transform:scale(.85)}75%{transform:scale(1.1)}100%{transform:scale(1)}}@keyframes boostRemove{0%{transform:scale(1);opacity:1}40%{transform:scale(.6);opacity:1}70%{transform:scale(1.3);opacity:.8}100%{transform:scale(0);opacity:0}}@keyframes boostSway{0%,100%{transform:translateX(0) rotate(-6deg)}50%{transform:translateX(15px) rotate(6deg)}}@keyframes boostPulse{0%{transform:scale(.85)}100%{transform:scale(1.15)}}</style></head><body><div id="assetCache"></div><div id="loadingScreen"><div class="loader"></div><div id="loadingText">ЗАГРУЗКА...</div></div><div class="game" id="gameContainer"><div id="boostIndicator"><img src="https://raw.githubusercontent.com/wei9htlessness/FUMOCLICK/main/symbols/x2.png" class="x2-img" draggable="false"></div><div id="counter"></div><div id="clickArea"><img id="clickImage" src="https://raw.githubusercontent.com/wei9htlessness/FUMOCLICK/main/fumo/1.png" draggable="false" alt="Click"></div></div><script>const tg=window.Telegram?.WebApp;if(tg){tg.ready();tg.expand();if(tg.disableVerticalSwipes)tg.disableVerticalSwipes();}function triggerHaptic(t='light'){if(tg&&tg.HapticFeedback)tg.HapticFeedback.impactOccurred(t);}const imageUrls=['https://raw.githubusercontent.com/wei9htlessness/FUMOCLICK/main/fumo/1.png','https://raw.githubusercontent.com/wei9htlessness/FUMOCLICK/main/monsterwhite.png','https://raw.githubusercontent.com/wei9htlessness/FUMOCLICK/main/cursor.png','https://raw.githubusercontent.com/wei9htlessness/FUMOCLICK/main/symbols/x2.png',...Array.from({length:10},(_,i)=>`https://raw.githubusercontent.com/wei9htlessness/FUMOCLICK/main/numbers/${i}.png`)];const soundUrls={pop:'https://raw.githubusercontent.com/wei9htlessness/FUMOCLICK/main/sounds/pop.ogg',monster:'https://raw.githubusercontent.com/wei9htlessness/FUMOCLICK/main/sounds/monsterenergy.ogg',bonus:'https://raw.githubusercontent.com/wei9htlessness/FUMOCLICK/main/sounds/bonus.ogg',bonusDelete:'https://raw.githubusercontent.com/wei9htlessness/FUMOCLICK/main/sounds/bonusdelete.ogg'};let clicks=0,clickMultiplier=1;const counter=document.getElementById("counter"),clickArea=document.getElementById("clickArea"),image=document.getElementById("clickImage"),boostIndicator=document.getElementById("boostIndicator"),loadingScreen=document.getElementById("loadingScreen"),gameContainer=document.getElementById("gameContainer"),assetCache=document.getElementById("assetCache");let boostTimeout,multiplierTimeout;let audioCtx=null,popBuffer=null,monsterBuffer=null,bonusBuffer=null,bonusDeleteBuffer=null;function initAudioContext(){if(!audioCtx){try{audioCtx=new(window.AudioContext||window.webkitAudioContext)();}catch(e){console.log("AudioContext error:",e);}}}function playSound(buffer,volume=0.5){if(!audioCtx||!buffer)return;if(audioCtx.state==='suspended')audioCtx.resume();const source=audioCtx.createBufferSource();const gain=audioCtx.createGain();gain.gain.value=volume;source.buffer=buffer;source.connect(gain);gain.connect(audioCtx.destination);source.start(0);}async function preloadResources(){initAudioContext();const imgPromises=imageUrls.map(url=>new Promise(resolve=>{let isResolved=false;const finish=()=>{if(!isResolved){isResolved=true;resolve(url);}};const img=new Image();img.addEventListener('load',finish,{once:true});img.addEventListener('error',finish,{once:true});img.src=url;setTimeout(finish,3000);}));const soundPromises=Object.entries(soundUrls).map(async([key,url])=>{try{const response=await fetch(url);const arrayBuffer=await response.arrayBuffer();const audioBuffer=await audioCtx.decodeAudioData(arrayBuffer);if(key==='pop')popBuffer=audioBuffer;if(key==='monster')monsterBuffer=audioBuffer;if(key==='bonus')bonusBuffer=audioBuffer;if(key==='bonusDelete')bonusDeleteBuffer=audioBuffer;}catch(e){console.log("Sound load error:",key,e);}});const globalTimeout=new Promise(resolve=>setTimeout(()=>resolve('global_timeout'),5000));await Promise.race([Promise.all([...imgPromises,...soundPromises]),globalTimeout]);await new Promise(r=>setTimeout(r,300));loadingScreen.classList.add('hidden');gameContainer.classList.add('visible');initGame();}function initGame(){for(let i=0;i<=9;i++){const img=document.createElement("img");img.src=`https://raw.githubusercontent.com/wei9htlessness/FUMOCLICK/main/numbers/${i}.png`;img.className="digit-img";assetCache.appendChild(img);}updateCounterDisplay();scheduleNextBoost();}function updateCounterDisplay(){const clicksStr=clicks.toString(),currentImages=Array.from(counter.querySelectorAll('.digit-img'));for(let i=currentImages.length;i<clicksStr.length;i++){const img=document.createElement("img");img.className="digit-img";img.draggable=false;counter.appendChild(img);currentImages.push(img);}while(currentImages.length>clicksStr.length){counter.removeChild(currentImages.pop());}for(let i=0;i<clicksStr.length;i++){const digit=clicksStr[i],expectedSrc=`https://raw.githubusercontent.com/wei9htlessness/FUMOCLICK/main/numbers/${digit}.png`;if(!currentImages[i].src.includes(`${digit}.png`)){currentImages[i].src=expectedSrc;}}}function processClick(e){if(e&&e.cancelable)e.preventDefault();clicks+=(1*clickMultiplier);updateCounterDisplay();playSound(popBuffer,0.5);triggerHaptic('light');image.style.transform="scale(1.1)";counter.classList.remove("pop");void counter.offsetWidth;counter.classList.add("pop");}function resetClickAnimation(e){if(e&&e.cancelable)e.preventDefault();image.style.transform="scale(1)";}clickArea.addEventListener("touchstart",processClick,{passive:false});clickArea.addEventListener("touchend",resetClickAnimation,{passive:false});clickArea.addEventListener("touchcancel",resetClickAnimation,{passive:false});clickArea.addEventListener("mousedown",processClick);clickArea.addEventListener("mouseup",resetClickAnimation);clickArea.addEventListener("mouseleave",resetClickAnimation);clickArea.addEventListener("contextmenu",e=>e.preventDefault());function setAnimSpeed(mult){const a=clickArea.getAnimations();if(a.length>0)a[0].playbackRate=mult;}function spawnBoost(){const container=document.createElement("div");container.className="boost-container";const img=document.createElement("img");img.src="https://raw.githubusercontent.com/wei9htlessness/FUMOCLICK/main/monsterwhite.png";img.className="boost-image";img.draggable=false;container.appendChild(img);document.body.appendChild(container);const boostSize=150,maxX=window.innerWidth-boostSize-20,maxY=window.innerHeight-boostSize-20,randomX=Math.max(20,Math.random()*maxX),randomY=Math.max(20,Math.random()*maxY);container.style.left=randomX+"px";container.style.top=randomY+"px";playSound(bonusBuffer,0.5);let boostActivated=false;const activateBoost=e=>{if(boostActivated)return;if(e&&e.cancelable)e.preventDefault();e.stopPropagation();boostActivated=true;playSound(monsterBuffer,0.5);triggerHaptic('medium');clickMultiplier=2;boostIndicator.classList.add("active");setAnimSpeed(4);container.style.transform="scale(1.3)";container.style.opacity="0";setTimeout(()=>{if(document.body.contains(container))container.remove();},300);clearTimeout(boostTimeout);clearTimeout(multiplierTimeout);multiplierTimeout=setTimeout(()=>{clickMultiplier=1;boostIndicator.classList.remove("active");setAnimSpeed(1);scheduleNextBoost();},10000);};container.addEventListener("touchstart",activateBoost,{passive:false});container.addEventListener("mousedown",activateBoost);container.addEventListener("contextmenu",e=>e.preventDefault());boostTimeout=setTimeout(()=>{if(document.body.contains(container)&&!boostActivated){playSound(bonusDeleteBuffer,0.4);container.classList.add("removing");setTimeout(()=>{if(document.body.contains(container))container.remove();},300);scheduleNextBoost();}},5000);}function scheduleNextBoost(){const delay=Math.floor(Math.random()*(40000-15000+1))+15000;setTimeout(spawnBoost,delay);}preloadResources();</script></body></html>
