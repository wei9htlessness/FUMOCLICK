];

const soundUrls = {

};

let clicks = 0, clickMultiplier = 1;
const counter = document.getElementById("counter"), clickArea = document.getElementById("clickArea"),
      image = document.getElementById("clickImage"), boostIndicator = document.getElementById("boostIndicator"),
      loadingScreen = document.getElementById("loadingScreen"), gameContainer = document.getElementById("gameContainer"),
      assetCache = document.getElementById("assetCache"), modal = document.getElementById("modal"),
      modalCloseWrapper = document.getElementById("modalCloseWrapper"), leaderboardList = document.getElementById("leaderboardList"),
      leaderboardLoading = document.getElementById("leaderboardLoading"), leaderboardRefreshTop = document.getElementById("leaderboardRefreshTop"),
      leaderboardTimer = document.getElementById("leaderboardTimer"),
      hardResetBtn = document.getElementById("hardResetBtn"), confirmResetModal = document.getElementById("confirmResetModal"),
      confirmResetBtn = document.getElementById("confirmResetBtn"), cancelResetBtn = document.getElementById("cancelResetBtn"),
      radioBtn = document.getElementById("radioBtn"), radioBtnImg = document.getElementById("radioBtnImg"),
      volumeSlider = document.getElementById("volumeSlider");

let boostTimeout, multiplierTimeout, audioCtx = null, buffers = {}, menuOpenPlaying = false, menuClosePlaying = false, saveTimeout = null;
let leaderboardInterval = null, refreshCountdown = null, countdownValue = 10;
let radioAudio = null, isRadioPlaying = false, hasLoadedLeaderboardOnce = false;

const defaultGameState = {
    score: 0, selectedCharacter: 1, upgrades: { clickPower: 1, autoClick: 0, critChance: 0 },
    settings: { soundEnabled: true, hapticEnabled: true, theme: 'default', radioEnabled: 1, radioVolume: 50 },
    achievements: []
};
let gameState = JSON.parse(JSON.stringify(defaultGameState));

function initAudioContext() {
    if (!audioCtx) { try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch (e) {} }
}

function playSound(buffer, volume = 0.5) {
    if (!audioCtx || !buffer) return;
    if (audioCtx.state === 'suspended') audioCtx.resume();
    const source = audioCtx.createBufferSource(), gain = audioCtx.createGain();
    gain.gain.value = volume; source.buffer = buffer; source.connect(gain); gain.connect(audioCtx.destination); source.start(0);
}

async function updateFirebaseScore() {
    if (!tgUserId) return;
    try {
        const userRef = ref(db, 'leaderboard/' + tgUserId);
        await runTransaction(userRef, (currentData) => {
            if (currentData === null) {
                return { name: userName, score: clicks, lastUpdated: Date.now() };
            } else {
                if (clicks > currentData.score) {
                    return { name: userName, score: clicks, lastUpdated: Date.now() };
                } else {
                    clicks = currentData.score;
                    updateCounterDisplay();
                    return currentData;
                }
            }
        });
    } catch (e) { console.error("Firebase update error:", e); }
}

async function loadLeaderboard() {
    if (!hasLoadedLeaderboardOnce) {
        leaderboardLoading.style.display = 'flex';
        leaderboardList.style.display = 'none';
        leaderboardRefreshTop.style.display = 'none';
    }
    
    try {
        const snapshot = await get(ref(db, 'leaderboard'));
        if (!snapshot.exists()) { 
            renderLeaderboard([]); 
            return; 
        }
        const q = query(ref(db, 'leaderboard'), orderByChild('score'), limitToLast(10));
        const querySnapshot = await get(q);
        if (querySnapshot.exists()) {
            renderLeaderboard(Object.values(querySnapshot.val()).sort((a, b) => b.score - a.score));
        } else { renderLeaderboard([]); }
    } catch (e) { console.error("Firebase load error:", e); renderLeaderboard([]); }
    finally {
        if (!hasLoadedLeaderboardOnce) {
            leaderboardLoading.style.display = 'none';
            leaderboardList.style.display = 'flex';
            leaderboardRefreshTop.style.display = 'flex';
            hasLoadedLeaderboardOnce = true;
        }
    }
}

function renderTimer(seconds) {
    leaderboardTimer.innerHTML = '';
    if (seconds > 0) {
        const digits = seconds.toString().split('');
        for (const digit of digits) {
            const img = document.createElement('img');
            img.src = `https://raw.githubusercontent.com/wei9htlessness/FUMOCLICK/main/numbers/${digit}.png`;
            img.draggable = false; img.style.height = '20px';
            img.style.pointerEvents = 'none';
            img.style.webkitUserDrag = 'none';
            leaderboardTimer.appendChild(img);
        }
        for (let i = 0; i < 3; i++) {
            const period = document.createElement('img');
            period.src = `https://raw.githubusercontent.com/wei9htlessness/FUMOCLICK/main/symbols/period.png`;
            period.draggable = false; period.style.height = '20px';
            period.style.pointerEvents = 'none';
            period.style.webkitUserDrag = 'none';
            leaderboardTimer.appendChild(period);
        }
    }
}

function startRefreshTimer() {
    countdownValue = 10;
    renderTimer(countdownValue);
    if (refreshCountdown) clearInterval(refreshCountdown);
    refreshCountdown = setInterval(() => {
        countdownValue--;
        renderTimer(countdownValue);
        if (countdownValue <= 0) {
            clearInterval(refreshCountdown);
            if (modal.classList.contains('active') && document.getElementById('achvSection').classList.contains('active')) {
                loadLeaderboard();
                startRefreshTimer();
            }
        }
    }, 1000);
}

function renderLeaderboard(players) {
    leaderboardList.innerHTML = '';
    if (players.length === 0) {
        leaderboardList.innerHTML = '<div style="text-align:center;padding:20px;color:#888;">Пока нет записей</div>';
        return;
    }
    players.forEach((player, index) => {
        const item = document.createElement('div'); item.className = 'leaderboard-item';
        const rankName = document.createElement('div'); rankName.className = 'leaderboard-rank-name';
        const rank = document.createElement('div'); rank.className = 'leaderboard-rank'; rank.textContent = `#${index + 1}`;
        const name = document.createElement('div'); name.className = 'leaderboard-name'; name.textContent = player.name;
        rankName.appendChild(rank); rankName.appendChild(name);
        const scoreContainer = document.createElement('div'); scoreContainer.className = 'leaderboard-score';
        const scoreStr = player.score.toString();
        for (const digit of scoreStr) {
            const img = document.createElement('img'); img.src = `https://raw.githubusercontent.com/wei9htlessness/FUMOCLICK/main/numbers/${digit}.png`;
            img.alt = digit; img.draggable = false; scoreContainer.appendChild(img);
        }
        item.appendChild(rankName); item.appendChild(scoreContainer); leaderboardList.appendChild(item);
    });
}

async function loadLocalGame() {
    try {
        if (tg && tg.CloudStorage) {
            const data = await new Promise((resolve, reject) => tg.CloudStorage.getItem('gameData', (err, value) => err ? reject(err) : resolve(value)));
            if (data) {
                const parsed = typeof data === 'string' ? JSON.parse(data) : (typeof data === 'object' ? data : null);
                if (parsed) { 
                    Object.assign(gameState, parsed); 
                    clicks = gameState.score || 0; 
                }
            }
        }
    } catch (e) { console.error('Local load error:', e); }
}

async function saveLocalGame() {
    gameState.score = clicks;
    try {
        if (tg && tg.CloudStorage) {
            await new Promise((resolve, reject) => tg.CloudStorage.setItem('gameData', JSON.stringify(gameState), (err) => err ? reject(err) : resolve(true)));
        }
    } catch (e) { console.error('Local save error:', e); }
}

function scheduleSave() {
    if (saveTimeout) clearTimeout(saveTimeout);
    saveTimeout = setTimeout(async () => { await saveLocalGame(); await updateFirebaseScore(); }, 500);
}

function initRadio() {
    if (!radioAudio) {
        radioAudio = new Audio('https://radio.loficafe.net/listen/japanese-lofi/radio.mp3');
        radioAudio.loop = true;
    }
    
    const vol = gameState.settings.radioVolume !== undefined ? gameState.settings.radioVolume : 50;
    volumeSlider.value = vol;
    radioAudio.volume = vol / 100;

    if (gameState.settings.radioEnabled === 1 && vol > 0) {
        radioAudio.play().catch(err => console.log("Radio autoplay blocked:", err));
        radioBtnImg.src = 'https://raw.githubusercontent.com/wei9htlessness/FUMOCLICK/main/ui/radioon.png';
        isRadioPlaying = true;
    } else {
        radioAudio.pause();
        radioBtnImg.src = 'https://raw.githubusercontent.com/wei9htlessness/FUMOCLICK/main/ui/radiooff.png';
        isRadioPlaying = false;
    }
}

async function preloadResources() {
    initAudioContext(); await loadLocalGame();
    const imgPromises = imageUrls.map(url => new Promise(resolve => {
        let done = false; const finish = () => { if (!done) { done = true; resolve(); } };
        const img = new Image(); img.addEventListener('load', finish, { once: true }); img.addEventListener('error', finish, { once: true }); img.src = url; setTimeout(finish, 3000);
    }));
    const soundPromises = Object.entries(soundUrls).map(async ([key, url]) => {
        try { const r = await fetch(url); buffers[key] = await audioCtx.decodeAudioData(await r.arrayBuffer()); } catch (e) {}
    });
    await Promise.race([Promise.all([...imgPromises, ...soundPromises]), new Promise(resolve => setTimeout(resolve, 5000))]);
    await new Promise(r => setTimeout(r, 300));
    loadingScreen.classList.add('hidden'); gameContainer.classList.add('visible'); 
    initGame();
    initRadio();
}

function initGame() {
    for (let i = 0; i <= 9; i++) {
        const img = document.createElement("img"); img.src = `https://raw.githubusercontent.com/wei9htlessness/FUMOCLICK/main/numbers/${i}.png`;
        img.className = "digit-img"; assetCache.appendChild(img);
    }
    updateCounterDisplay(); scheduleNextBoost();
    setInterval(() => { saveLocalGame(); updateFirebaseScore(); }, 10000);
}

function updateCounterDisplay() {
    const s = clicks.toString(), imgs = Array.from(counter.querySelectorAll('.digit-img'));
    for (let i = imgs.length; i < s.length; i++) { const img = document.createElement("img"); img.className = "digit-img"; img.draggable = false; counter.appendChild(img); imgs.push(img); }
    while (imgs.length > s.length) counter.removeChild(imgs.pop());
    for (let i = 0; i < s.length; i++) {
        const src = `https://raw.githubusercontent.com/wei9htlessness/FUMOCLICK/main/numbers/${s[i]}.png`;
        if (!imgs[i].src.includes(`${s[i]}.png`)) imgs[i].src = src;
    }
}

function processClick(e) {
    if (e && e.cancelable) e.preventDefault();
    clicks += (1 * clickMultiplier * gameState.upgrades.clickPower); updateCounterDisplay(); playSound(buffers.pop, 0.5); triggerHaptic('light');
    image.style.transform = "scale(1.1) scaleY(0.9)"; counter.classList.remove("pop"); void counter.offsetWidth; counter.classList.add("pop"); scheduleSave();
}

function resetClickAnimation(e) { if (e && e.cancelable) e.preventDefault(); image.style.transform = "scale(1) scaleY(1)"; }

clickArea.addEventListener("touchstart", processClick, { passive: false }); clickArea.addEventListener("touchend", resetClickAnimation, { passive: false });
clickArea.addEventListener("touchcancel", resetClickAnimation, { passive: false }); clickArea.addEventListener("mousedown", processClick);
clickArea.addEventListener("mouseup", resetClickAnimation); clickArea.addEventListener("mouseleave", resetClickAnimation);
clickArea.addEventListener("contextmenu", e => e.preventDefault());

function setAnimSpeed(mult) { const a = clickArea.getAnimations(); if (a.length > 0) a[0].playbackRate = mult; }

function spawnBoost() {
    const container = document.createElement("div"); container.className = "boost-container";
    const spring = document.createElement("div"); spring.className = "boost-spring spawning";
    const sway = document.createElement("div"); sway.className = "boost-sway";
    const img = document.createElement("img"); img.src = "https://raw.githubusercontent.com/wei9htlessness/FUMOCLICK/main/monsterwhite.png";
    img.className = "boost-image"; img.draggable = false; sway.appendChild(img); spring.appendChild(sway); container.appendChild(spring); document.body.appendChild(container);
    playSound(buffers.bonus, 0.5);
    const boostSize = 150, maxX = window.innerWidth - boostSize - 20, maxY = window.innerHeight - boostSize - 20;
    container.style.left = Math.max(20, Math.random() * maxX) + "px"; container.style.top = Math.max(20, Math.random() * maxY) + "px";
    let boostActivated = false;
    const activateBoost = e => {
        if (boostActivated) return; if (e && e.cancelable) e.preventDefault(); e.stopPropagation(); boostActivated = true;
        playSound(buffers.monster, 0.5); triggerHaptic('medium'); clickMultiplier = 2; boostIndicator.classList.add("active"); setAnimSpeed(4);
        spring.className = "boost-spring despawning"; setTimeout(() => { if (document.body.contains(container)) container.remove(); }, 150);
        clearTimeout(boostTimeout); clearTimeout(multiplierTimeout);
        multiplierTimeout = setTimeout(() => { clickMultiplier = 1; boostIndicator.classList.remove("active"); setAnimSpeed(1); scheduleNextBoost(); }, 10000);
    };
    container.addEventListener("touchstart", activateBoost, { passive: false }); container.addEventListener("mousedown", activateBoost); container.addEventListener("contextmenu", e => e.preventDefault());
    boostTimeout = setTimeout(() => {
        if (!boostActivated && document.body.contains(container)) {
            playSound(buffers.bonusdelete, 0.5); spring.className = "boost-spring despawning";
            setTimeout(() => { if (document.body.contains(container)) container.remove(); }, 150); setTimeout(() => scheduleNextBoost(), 150);
        }
    }, 5000);
}

function scheduleNextBoost() { setTimeout(spawnBoost, Math.floor(Math.random() * (40000 - 15000 + 1)) + 15000); }

let currentModalType = '';
document.querySelectorAll('.ui-btn-wrapper').forEach(wrapper => {
    wrapper.addEventListener("click", e => {
        e.preventDefault(); e.stopPropagation(); triggerHaptic('light'); currentModalType = wrapper.dataset.modal;
        document.querySelectorAll('.modal-section').forEach(sec => sec.classList.remove('active'));
        if (currentModalType === 'achv') { 
            document.getElementById('achvSection').classList.add('active'); 
            loadLeaderboard();
            startRefreshTimer();
            if (leaderboardInterval) clearInterval(leaderboardInterval);
            leaderboardInterval = setInterval(() => {
                if (document.getElementById('achvSection').classList.contains('active')) {
                    loadLeaderboard();
                }
            }, 10000);
        }
        else if (currentModalType === 'settings') { document.getElementById('settingsSection').classList.add('active'); }
        else if (currentModalType === 'shop') { document.getElementById('shopSection').classList.add('active'); }
        openModal();
    });
    wrapper.addEventListener("contextmenu", e => e.preventDefault());
});

modalCloseWrapper.addEventListener("click", e => { 
    e.preventDefault(); e.stopPropagation(); triggerHaptic('light'); 
    if (leaderboardInterval) { clearInterval(leaderboardInterval); leaderboardInterval = null; }
    if (refreshCountdown) { clearInterval(refreshCountdown); refreshCountdown = null; }
    closeModal(); 
});
modalCloseWrapper.addEventListener("contextmenu", e => e.preventDefault());

hardResetBtn.addEventListener("click", e => {
    e.preventDefault(); e.stopPropagation(); triggerHaptic('light');
    playSound(buffers.click, 0.5);
    confirmResetModal.classList.add('active');
});
hardResetBtn.addEventListener("contextmenu", e => e.preventDefault());

confirmResetBtn.addEventListener("click", async e => {
    e.preventDefault(); e.stopPropagation(); triggerHaptic('medium');
    playSound(buffers.click, 0.5);
    clicks = 0; clickMultiplier = 1; 
    gameState = JSON.parse(JSON.stringify(defaultGameState));
    updateCounterDisplay();
    try {
        if (tg && tg.CloudStorage) {
            await new Promise((resolve, reject) => tg.CloudStorage.setItem('gameData', JSON.stringify(gameState), (err) => err ? reject(err) : resolve(true)));
        }
        if (tgUserId) {
            await set(ref(db, 'leaderboard/' + tgUserId), { name: userName, score: 0, lastUpdated: Date.now() });
        }
    } catch (err) { console.error("Hard reset error:", err); }
    confirmResetModal.classList.remove('active');
    closeModal();
});
confirmResetBtn.addEventListener("contextmenu", e => e.preventDefault());

cancelResetBtn.addEventListener("click", e => {
    e.preventDefault(); e.stopPropagation(); triggerHaptic('light');
    playSound(buffers.click, 0.5);
    confirmResetModal.classList.remove('active');
});
cancelResetBtn.addEventListener("contextmenu", e => e.preventDefault());

radioBtn.addEventListener("click", e => {
    e.preventDefault(); e.stopPropagation(); triggerHaptic('light');
    playSound(buffers.click, 0.5);
    
    if (isRadioPlaying) {
        radioAudio.pause();
        radioBtnImg.src = 'https://raw.githubusercontent.com/wei9htlessness/FUMOCLICK/main/ui/radiooff.png';
        isRadioPlaying = false;
        gameState.settings.radioEnabled = 0;
    } else {
        if (radioAudio.volume === 0) {
            radioAudio.volume = 0.5;
            volumeSlider.value = 50;
            gameState.settings.radioVolume = 50;
        }
        radioAudio.play().catch(err => console.log("Radio play blocked:", err));
        radioBtnImg.src = 'https://raw.githubusercontent.com/wei9htlessness/FUMOCLICK/main/ui/radioon.png';
        isRadioPlaying = true;
        gameState.settings.radioEnabled = 1;
    }
    scheduleSave();
});
radioBtn.addEventListener("contextmenu", e => e.preventDefault());

volumeSlider.addEventListener("input", e => {
    const vol = parseInt(e.target.value);
    gameState.settings.radioVolume = vol;
    radioAudio.volume = vol / 100;
    
    if (vol === 0) {
        radioAudio.pause();
        radioBtnImg.src = 'https://raw.githubusercontent.com/wei9htlessness/FUMOCLICK/main/ui/radiooff.png';
        isRadioPlaying = false;
        gameState.settings.radioEnabled = 0;
    } else {
        if (!isRadioPlaying) {
            radioAudio.play().catch(err => console.log("Radio play blocked:", err));
            radioBtnImg.src = 'https://raw.githubusercontent.com/wei9htlessness/FUMOCLICK/main/ui/radioon.png';
            isRadioPlaying = true;
        }
        gameState.settings.radioEnabled = 1;
    }
    scheduleSave();
});

leaderboardRefreshTop.addEventListener("click", async e => {
    e.preventDefault(); e.stopPropagation(); triggerHaptic('light');
    playSound(buffers.click, 0.5);
    await updateFirebaseScore();
    loadLeaderboard();
    startRefreshTimer();
});
leaderboardRefreshTop.addEventListener("contextmenu", e => e.preventDefault());

function openModal() {
    if (modal.classList.contains('active') || menuOpenPlaying) return; menuOpenPlaying = true;
    playSound(buffers.menuopen, 0.5); modal.classList.add('active'); setTimeout(() => { menuOpenPlaying = false; }, 500);
}

function closeModal() {
    if (!modal.classList.contains('active') || menuClosePlaying) return; menuClosePlaying = true;
    playSound(buffers.menuclose, 0.5); modal.classList.remove('active'); setTimeout(() => { menuClosePlaying = false; }, 500);
}

document.addEventListener('visibilitychange', () => { if (document.hidden) { saveLocalGame(); updateFirebaseScore(); } });
window.addEventListener('beforeunload', () => { saveLocalGame(); updateFirebaseScore(); });
window.addEventListener('pagehide', () => { saveLocalGame(); updateFirebaseScore(); });

preloadResources();
</script></body></html>
